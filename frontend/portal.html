<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MMS Industries — Select Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background: #0f1115; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; perspective: 1000px; }
    .container { display: flex; gap: 4rem; flex-wrap: wrap; padding: 2rem; justify-content: center; width: 100%; max-width: 1200px; position: relative; z-index: 10; }
    
    .card {
      background: rgba(21, 24, 30, 0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; width: 420px;
      padding: 5rem 3rem; text-align: center; display: flex; flex-direction: column; align-items: center;
      text-decoration: none; position: relative; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      transform-style: preserve-3d; transition: all 0.1s ease;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }
    
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 20px;
      background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.06), transparent 40%);
      z-index: 1; pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .card:hover::before { opacity: 1; }

    .card::after {
      content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border-radius: 22px;
      background: radial-gradient(400px circle at var(--mouse-x) var(--mouse-y), var(--glow-color), transparent 40%);
      z-index: -1; opacity: 0; transition: opacity 0.3s;
    }
    .card:hover::after { opacity: 1; }

    .card.admin { --glow-color: rgba(239, 68, 68, 0.5); }
    .card.client { --glow-color: rgba(139, 92, 246, 0.5); }

    .card-content { transform: translateZ(60px); position: relative; z-index: 2; width: 100%; }
    
    .icon { font-size: 4rem; color: #fff; margin-bottom: 2rem; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); transition: transform 0.3s; }
    .card.admin:hover .icon { color: #f87171; filter: drop-shadow(0 0 30px rgba(239, 68, 68, 0.6)); transform: scale(1.1) translateZ(20px); }
    .card.client:hover .icon { color: #a78bfa; filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.6)); transform: scale(1.1) translateZ(20px); }
    
    .title { color: #fff; font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; margin-bottom: 1rem; text-transform: uppercase; }
    .desc { color: #8b949e; font-size: 1rem; margin-bottom: 3rem; line-height: 1.5; }
    
    .divider { width: 100%; height: 2px; background: rgba(255,255,255,0.05); margin-bottom: 3rem; position: relative; overflow: hidden; }
    .divider::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--glow-color), transparent);
    }
    .card:hover .divider::after { animation: slideGlow 1.5s ease-in-out infinite; }
    @keyframes slideGlow { 100% { left: 200%; } }
    
    .btn {
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 1rem 2rem; border-radius: 8px;
      font-size: 0.9rem; font-weight: 700; letter-spacing: 1px; transition: all 0.3s; width: 100%; display: block;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .card.admin:hover .btn { background: #ef4444; border-color: #f87171; box-shadow: 0 0 30px rgba(239, 68, 68, 0.4); transform: translateY(-5px); }
    .card.client:hover .btn { background: #8b5cf6; border-color: #a78bfa; box-shadow: 0 0 30px rgba(139, 92, 246, 0.4); transform: translateY(-5px); }

    /* Portal Entry Animation */
    .container { animation: portalEntry 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes portalEntry {
      0% { opacity: 0; transform: scale(0.8) translateY(100px) rotateX(20deg); filter: blur(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0) rotateX(0deg); filter: blur(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Admin Card -->
    <a href="/admin-login.html" class="card admin">
      <div class="card-content">
        <div class="icon">🛡️</div>
        <div class="title">Admin Terminal</div>
        <div class="desc">System Management & Inventory Control</div>
        <div class="divider"></div>
        <span class="btn">INITIALIZE ADMIN</span>
      </div>
    </a>

    <!-- Client Card -->
    <a href="/login.html" class="card client">
      <div class="card-content">
        <div class="icon">🪪</div>
        <div class="title">Client Portal</div>
        <div class="desc">Access Catalog & Request Services</div>
        <div class="divider"></div>
        <span class="btn">INITIALIZE CLIENT</span>
      </div>
    </a>
  </div>

  <script>
    const token = localStorage.getItem('mms_token');
    const user  = (() => { try { return JSON.parse(localStorage.getItem('mms_user')); } catch { return null; } })();
    if (token && user) {
      location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/index.html';
    }

    // 3D Tilt Effect & Glow Tracking
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);

        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -15; // Max 15 deg tilt
        const rotateY = ((x - centerX) / centerX) * 15;

        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
      });

      card.addEventListener('mouseleave', () => {
        card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        card.style.transition = 'transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1)';
      });

      card.addEventListener('mouseenter', () => {
        card.style.transition = 'none';
      });
    });
  </script>
<script src="/js/visual-engine.js"></script>
</body>
</html>
